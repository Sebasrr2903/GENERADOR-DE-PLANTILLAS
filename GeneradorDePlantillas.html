    .flex-container {

      flex-wrap: wrap;
      justify-content: center;
      align-items: flex-start;
    }

    .container {
      background: #fff;
      padding: 20px;
      border-radius: 8px;

    .checkbox-section label {
  display: block;  /* Esto los pone uno debajo del otro */

}

 select, textarea,#new,input[type="text"], input[type="date"] {
  display: block;
  width: 100%;
  margin: 10px 0;
  padding: 12px 14px; /* aumenta altura */
  border-radius: 10px; /* bordes redondeados */
  border: 1px solid #ccc;
  box-sizing: border-box;
  font-size: 1rem;
}

   textarea {
  height: 200px;
  padding: 12px 14px;
  border-radius: 10px;
  font-size: 1rem;
  border: 1px solid #ccc;
  box-sizing: border-box;
}

#new {
  background-color: #0078d7;
  color: white;
  border: none;
  padding: 12px 16px; /* más altura */
  border-radius: 10px; /* redondeado */
  font-size: 1rem;
  cursor: pointer;
  transition: background 0.3s ease;
}
#ocultar{
  background-color: #068f71;
  color: white;
  border: none;
   padding: 12px 16px; /* más altura */
  border-radius: 10px; /* redondeado */

}

#new:hover {
  background-color: #005fa3;
}




    .calculadora {

      padding: 20px;

    }

    .botones {
      display: grid;
      grid-template-columns: repeat(4, 1fr);

  }
}

        let calcInput = "";

     function appendCalc(value) {
          calcInput += value;
          document.getElementById("calcDisplay").value = calcInput;
        }

     function calculate() {
            try {
             
              const sanitizedInput = calcInput.replace(/\./g, '').replace(/,/g, '.');

             
              const result = eval(sanitizedInput);

              
              const formattedResult = result.toLocaleString('en-US', { minimumFractionDigits: 2 });

              
              calcInput = formattedResult;
              document.getElementById("calcDisplay").value = calcInput;
            } catch (e) {
              
              document.getElementById("calcDisplay").value = "Error";
              calcInput = "";
            }
  }

        function clearCalc() {
          calcInput = "";
          document.getElementById("calcDisplay").value = "";
        }

        // Actualiza calcInput al escribir o pegar
        document.getElementById("calcDisplay").addEventListener("input", function(e) {
          calcInput = this.value;
        });

        // Calcular con tecla Enter
        document.getElementById("calcDisplay").addEventListener("keydown", function(e) {
          if (e.key === "Enter") {
            calculate();
          }
        });
